name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 runner -> aarch64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
            ff_arch: darwin-arm64
          # Windows x64 runner -> x86_64-pc-windows-msvc
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ff_arch: win32-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - name: Fetch ffmpeg/ffprobe sidecar binaries (${{ matrix.target }})
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          FFMPEG_TAG="b6.1.1"
          BASE="https://github.com/eugeneware/ffmpeg-static/releases/download/${FFMPEG_TAG}"
          ARCH="${{ matrix.ff_arch }}"
          EXT=""
          case "${{ matrix.target }}" in
            *-pc-windows-*) EXT=".exe" ;;
          esac
          # Download uncompressed ffmpeg + ffprobe for this platform, then
          # rename to the Tauri sidecar convention: <name>-<target-triple>[.exe]
          curl -fL "${BASE}/ffmpeg-${ARCH}"  -o "src-tauri/binaries/ffmpeg-${{ matrix.target }}${EXT}"
          curl -fL "${BASE}/ffprobe-${ARCH}" -o "src-tauri/binaries/ffprobe-${{ matrix.target }}${EXT}"
          chmod +x "src-tauri/binaries/ffmpeg-${{ matrix.target }}${EXT}" \
                   "src-tauri/binaries/ffprobe-${{ matrix.target }}${EXT}"
          ls -lh src-tauri/binaries/

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Tauri names bundles with the bare version (Transcriptor_0.2.1_...),
      # while the tag is v0.2.1 — using github.ref_name in the notes pointed
      # users at filenames that never existed.
      - name: Resolve version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # tauri-action replaces the old `pnpm tauri build` + action-gh-release
      # pair: it signs the updater artifacts, uploads them to the release for
      # this tag, and merges every platform's signature into a single
      # latest.json — which is the endpoint the in-app updater reads. Both
      # matrix jobs target the same release, so whichever finishes second adds
      # its platform to the manifest the first one created.
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Generated with `pnpm tauri signer generate`. Without these the
          # build still succeeds but ships no .sig, and the updater will
          # reject the release.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: '11.0'
          # whisper-rs-sys forwards any CMAKE_* env var to its cmake build of
          # whisper.cpp/ggml. Setting CMAKE_OSX_DEPLOYMENT_TARGET ensures the
          # C++ subproject targets macOS 11.0 so std::filesystem::path / u8path
          # (introduced in 10.15) are available. MACOSX_DEPLOYMENT_TARGET alone
          # is not reliably propagated to the cmake subproject on newer SDKs.
          CMAKE_OSX_DEPLOYMENT_TARGET: '11.0'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Transcriptor ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}
          releaseBody: |
            Transcriptor ${{ github.ref_name }}

            ffmpeg/ffprobe are **bundled** — you don't need to install anything else.

            ## macOS (Apple Silicon — M1/M2/M3/M4)

            1. Download **`Transcriptor_${{ env.VERSION }}_aarch64.dmg`**.
            2. Open the `.dmg` and drag **Transcriptor** into **Applications**.
            3. The app is **not code-signed or notarized**, so the first time you open it macOS will show **"Transcriptor is damaged and can't be opened."** This is Gatekeeper refusing an unsigned binary — the app is fine. Fix it once in **Terminal**:
               ```bash
               xattr -cr /Applications/Transcriptor.app
               ```
            4. Double-click **Transcriptor** in Applications to launch it.

            > No Intel Mac build yet — only Apple Silicon. ffmpeg is bundled inside the app.

            ## Windows (x64 — Windows 10/11)

            1. Download **`Transcriptor_${{ env.VERSION }}_x64-setup.exe`** (NSIS) **or** **`Transcriptor_${{ env.VERSION }}_x64_en-US.msi`** (MSI). Either works; pick one.
            2. Run the installer. The installer is **unsigned**, so SmartScreen may warn **"Windows protected your PC"** — click **More info → Run anyway** to proceed.
            3. Launch **Transcriptor** from the Start menu.

            > ffmpeg is bundled inside the app — no `choco`/`scoop` install needed.
