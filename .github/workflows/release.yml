name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 runner -> aarch64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
            ff_arch: darwin-arm64
          # Windows x64 runner -> x86_64-pc-windows-msvc
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ff_arch: win32-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch ffmpeg/ffprobe sidecar binaries (${{ matrix.target }})
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          FFMPEG_TAG="b6.1.1"
          BASE="https://github.com/eugeneware/ffmpeg-static/releases/download/${FFMPEG_TAG}"
          ARCH="${{ matrix.ff_arch }}"
          EXT=""
          case "${{ matrix.target }}" in
            *-pc-windows-*) EXT=".exe" ;;
          esac
          # Download uncompressed ffmpeg + ffprobe for this platform, then
          # rename to the Tauri sidecar convention: <name>-<target-triple>[.exe]
          curl -fL "${BASE}/ffmpeg-${ARCH}"  -o "src-tauri/binaries/ffmpeg-${{ matrix.target }}${EXT}"
          curl -fL "${BASE}/ffprobe-${ARCH}" -o "src-tauri/binaries/ffprobe-${{ matrix.target }}${EXT}"
          chmod +x "src-tauri/binaries/ffmpeg-${{ matrix.target }}${EXT}" \
                   "src-tauri/binaries/ffprobe-${{ matrix.target }}${EXT}"
          ls -lh src-tauri/binaries/

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app (host OS installer)
        run: pnpm tauri build
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
          # whisper-rs-sys forwards any CMAKE_* env var to its cmake build of
          # whisper.cpp/ggml. Setting CMAKE_OSX_DEPLOYMENT_TARGET ensures the
          # C++ subproject targets macOS 11.0 so std::filesystem::path / u8path
          # (introduced in 10.15) are available. MACOSX_DEPLOYMENT_TARGET alone
          # is not reliably propagated to the cmake subproject on newer SDKs.
          CMAKE_OSX_DEPLOYMENT_TARGET: '11.0'

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
          body: |
            Transcriptor ${{ github.ref_name }}

            ## Downloads
            - **macOS (Apple Silicon):** `.dmg`
            - **Windows (x64):** `.msi` or `.exe` (NSIS)

            ffmpeg/ffprobe are **bundled** — no separate install needed.

            ### macOS install note
            The app is not code-signed or notarized. After installing, macOS may
            show "Transcriptor is damaged and can't be opened". Strip the
            quarantine flag once and it opens normally:
            ```bash
            xattr -cr /Applications/Transcriptor.app
            ```

            ### Windows install note
            The installer is unsigned, so SmartScreen may warn "Windows protected
            your PC". Click **More info → Run anyway** to proceed.
          generate_release_notes: false