name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf ffmpeg

      - name: Install ffmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install ffmpeg -y

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build app (host OS installer)
        run: pnpm tauri build ${{ matrix.args }}
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
          # whisper-rs-sys forwards any CMAKE_* env var to its cmake build of
          # whisper.cpp/ggml. Setting CMAKE_OSX_DEPLOYMENT_TARGET ensures the
          # C++ subproject targets macOS 11.0 so std::filesystem::path / u8path
          # (introduced in 10.15) are available. MACOSX_DEPLOYMENT_TARGET alone
          # is not reliably propagated to the cmake subproject on newer SDKs.
          CMAKE_OSX_DEPLOYMENT_TARGET: '11.0'

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: transcriptor-${{ matrix.platform }}
          # Only ship the final installers, not the AppImage staging dir
          # (Transcriptor.AppDir/** adds ~200MB of intermediate scaffolding).
          path: |
            src-tauri/target/release/bundle/macos/**
            src-tauri/target/release/bundle/dmg/**
            src-tauri/target/release/bundle/deb/**
            src-tauri/target/release/bundle/rpm/**
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/**
            src-tauri/target/release/bundle/nsis/**
          if-no-files-found: error
